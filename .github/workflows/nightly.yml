name: Nightly

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -D warnings --cfg tokio_unstable
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Recreate nightly tag + release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          gh release delete nightly --yes --cleanup-tag --repo "${GITHUB_REPOSITORY}" || true
          git tag -f nightly "${GITHUB_SHA}"
          git push -f origin nightly
          gh release create nightly \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Nightly (main @ $(git rev-parse --short HEAD))" \
            --prerelease \
            --notes "Rolling build from \`main\` at ${GITHUB_SHA}.

          [View commit](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"

  upload-assets:
    needs: prepare-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - uses: rui314/setup-mold@v1

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: corrosion
          archive: "corrosion-$target"
          target: ${{ matrix.target }}
          ref: refs/tags/nightly
          token: ${{ secrets.GITHUB_TOKEN }}
