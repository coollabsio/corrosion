name: Nightly

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -D warnings --cfg tokio_unstable
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v3

      - name: Compute tag
        id: tag
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=main-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Push lightweight tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Main @ ${{ steps.tag.outputs.tag }}"
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          body: |
            Automated build from `main` at ${{ github.sha }}.

            [View commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v3

      - uses: rui314/setup-mold@v1

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu')

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: corrosion
          archive: "corrosion-$target"
          target: ${{ matrix.target }}
          ref: refs/tags/${{ needs.create-release.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
